name: Build Core (macOS)

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'github'
    outputs:
      version:
        description: "Extracted version from system_manager.py"
        value: ${{ jobs.build-macos.outputs.version }}

jobs:
  build-macos:
    name: Build macOS Executable
    # macOS Blacksmith runners are in private preview — update label once access is granted
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from system_manager.py
        id: version
        shell: bash
        run: |
          version=$(grep -oE 'LOCAL_VERSION\s*=\s*"[^"]+"' services/system_manager.py | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.7'

      - name: Install system dependencies
        run: brew install portaudio sdl2

      - name: Create venv and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          source venv/bin/activate
          pyinstaller WingmanAiCore.spec --noconfirm

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-macos-aarch64
          path: dist/WingmanAiCore/
          retention-days: 5

      - name: Upload to R2 staging
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip install awscli
          aws s3 cp dist/WingmanAiCore/ \
            "s3://wingman-staging/core/${{ github.sha }}/darwin-aarch64/" \
            --recursive \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          echo "${{ github.sha }}" > latest-macos.txt
          aws s3 cp latest-macos.txt \
            "s3://wingman-staging/core/latest-macos.txt" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

      - name: Clean up old staging builds
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          R2_ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          CURRENT_SHA="${{ github.sha }}"

          SHAS=$(aws s3 ls "s3://wingman-staging/core/" --endpoint-url "$R2_ENDPOINT" \
            | grep 'PRE ' | awk '{print $2}' | sed 's|/||' | grep -v '^latest')

          for SHA in $SHAS; do
            if [ "$SHA" != "$CURRENT_SHA" ]; then
              echo "Deleting old staging: core/$SHA/"
              aws s3 rm "s3://wingman-staging/core/${SHA}/" \
                --recursive --endpoint-url "$R2_ENDPOINT"
            fi
          done
