name: Build Core (Windows)

on:
  push:
    tags:
      - '*'
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'github'
    outputs:
      version:
        description: "Extracted version from system_manager.py"
        value: ${{ jobs.sign-windows-executable.outputs.version }}
      artifact_name:
        description: "Name of the signed artifact"
        value: ${{ jobs.sign-windows-executable.outputs.artifact_name }}

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: ${{ inputs.runner == 'blacksmith' && 'blacksmith-4vcpu-windows-2025' || 'windows-latest' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from system_manager.py
        id: version
        shell: bash
        run: |
          version=$(grep -oE 'LOCAL_VERSION\s*=\s*"[^"]+"' services/system_manager.py | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.7'

      - name: Create and activate venv
        run: |
          python -m venv venv
          .\venv\Scripts\Activate

      - name: Install Dependencies
        run: |
          .\venv\Scripts\Activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          .\venv\Scripts\Activate
          pyinstaller WingmanAiCore.spec --noconfirm

      - name: Upload Windows Exe Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-windows-unsigned
          path: dist/WingmanAiCore/
          retention-days: 1

  sign-windows-executable:
    needs: build-windows
    runs-on: ${{ inputs.runner == 'blacksmith' && 'blacksmith-4vcpu-windows-2025' || 'windows-2022' }}
    outputs:
      version: ${{ needs.build-windows.outputs.version }}
      artifact_name: ${{ steps.artifact.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: core-windows-unsigned
          path: WingmanAiCore

      - name: Sign
        env:
          CERTIFICATE_HOST: ${{ secrets.SM_HOST }}
          CERTIFICATE_HOST_API_KEY: ${{ secrets.SM_API_KEY }}
          CERTIFICATE_SHA1_HASH: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}
          CLIENT_CERTIFICATE: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
          CLIENT_CERTIFICATE_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
        uses: ./.github/actions/code-sign
        with:
          path-to-binary: 'WingmanAiCore/WingmanAiCore.exe'

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          artifact_name="WingmanAiCore-${{ needs.build-windows.outputs.version }}-x86_64-pc-windows"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WingmanAiCore-${{ needs.build-windows.outputs.version }}-x86_64-pc-windows
          path: WingmanAiCore
          retention-days: 5

      - name: Delete unsigned intermediate artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: core-windows-unsigned

      - name: Upload to R2 staging
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip install awscli
          aws s3 cp WingmanAiCore/ \
            "s3://wingman-staging/core/${{ github.sha }}/windows-x86_64/" \
            --recursive \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          echo "${{ github.sha }}" > latest-windows.txt
          aws s3 cp latest-windows.txt \
            "s3://wingman-staging/core/latest-windows.txt" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

      - name: Clean up old staging builds
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          R2_ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          CURRENT_SHA="${{ github.sha }}"

          # List all SHA directories and delete any that aren't the current build
          SHAS=$(aws s3 ls "s3://wingman-staging/core/" --endpoint-url "$R2_ENDPOINT" \
            | grep 'PRE ' | awk '{print $2}' | sed 's|/||' | grep -v '^latest')

          for SHA in $SHAS; do
            if [ "$SHA" != "$CURRENT_SHA" ]; then
              echo "Deleting old staging: core/$SHA/"
              aws s3 rm "s3://wingman-staging/core/${SHA}/" \
                --recursive --endpoint-url "$R2_ENDPOINT"
            fi
          done
